  {{NAME}}:
    image: {{IMAGE}}
    # The image entrypoint runs `surfpool "$@"`, so these are surfpool args.
    # `start --no-tui` is required for headless (non-interactive) operation.
    # The datasource args are `--offline` for a standalone local chain, or
    # `--rpc-url <url>` when forking. Boot airdrops seed the dev accounts; state
    # (persistence) and the Studio explorer slot in at the end — the latter as
    # `--no-studio` (off) or `--studio-port` (on); when on, a second published
    # port mapping (below) exposes Studio to the host.
    command: ["start", "--no-tui", "--host", "0.0.0.0", "--port", "{{PORT}}"{{DATASOURCE_ARGS}}{{AIRDROP_ARGS}}{{STATE_ARGS}}{{STUDIO_ARGS}}]
    ports:
      - "{{HOST_PORT}}:{{PORT}}"{{STUDIO_PORT_MAPPING}}
    volumes:
      - "./state:/state"
    restart: unless-stopped
