  {{NAME}}:
    image: {{IMAGE}}
    # The image entrypoint runs `surfpool "$@"`, so these are surfpool args.
    # `start --no-tui` is required for headless (non-interactive) operation.
    # `{{DATASOURCE_ARGS}}` is `--offline` for a standalone local chain, or
    # `--rpc-url <url>` when forking. Boot airdrops seed the dev accounts; state
    # (persistence) and the Studio UI slot in at the end.
    command: ["start", "--no-tui", "--host", "0.0.0.0", "--port", "{{PORT}}"{{DATASOURCE_ARGS}}{{AIRDROP_ARGS}}{{STATE_ARGS}}{{STUDIO_ARGS}}]
    ports:
      - "{{HOST_PORT}}:{{PORT}}"
    volumes:
      - "./state:/state"
    restart: unless-stopped
