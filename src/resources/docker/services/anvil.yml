  {{NAME}}:
    image: {{IMAGE}}
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--port", "{{PORT}}", "--chain-id", "{{CHAIN_ID}}", "--block-time", "1", "--load-state", "/state/anvil-tokens.json"]
    ports:
      - "{{HOST_PORT}}:{{PORT}}"
    volumes:
      - "./state/anvil-tokens.json:/state/anvil-tokens.json:ro"
    restart: unless-stopped
