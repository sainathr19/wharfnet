  {{NAME}}:
    image: {{IMAGE}}
    # The image entrypoint runs bitcoind/litecoind and, when the first arg starts
    # with '-', prepends the daemon itself — so these are daemon flags. Regtest is
    # a standalone, on-demand-mined chain (blocks come from `generatetoaddress`,
    # not a timer). RPC is bound on all interfaces with fixed dev credentials so
    # the host can reach it; `-fallbackfee` lets the wallet build faucet sends
    # without fee estimation. No volume: the datadir stays in-container, so every
    # boot is fresh (UTXO chains don't yet participate in --resume/--reset).
    command: ["-regtest", "-server", "-txindex", "-fallbackfee=0.0002", "-rpcuser=wharfnet", "-rpcpassword=wharfnet", "-rpcbind=0.0.0.0", "-rpcallowip=0.0.0.0/0", "-rpcport={{PORT}}", "-printtoconsole"]
    ports:
      - "{{HOST_PORT}}:{{PORT}}"
    restart: unless-stopped
