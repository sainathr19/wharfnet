name: Docs

# Build the Nextra docs site in landing/ and publish it to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow one concurrent deployment; let a new push cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: landing/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build (static export)
        run: pnpm build

      # next export writes the static site to landing/out; disable Jekyll so it
      # doesn't strip the _next/ assets.
      - run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
