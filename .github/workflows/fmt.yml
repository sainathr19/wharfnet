name: Formatting

on:
  # PRs are validated by the pull_request trigger below (on every commit), so
  # push only needs to cover direct pushes / merge commits to main. Listing dev
  # here too would double every check while a dev PR is open.
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

concurrency:
  group: fmt-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check
