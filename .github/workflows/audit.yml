name: Audit

# Scan dependencies for known security advisories (RustSec). Runs weekly so new
# advisories surface even without code changes, and whenever dependencies change.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  # PR dependency changes are covered by pull_request below; push only needs to
  # cover main, so a dep change on a PR branch isn't audited twice.
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"

permissions:
  contents: read

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit
